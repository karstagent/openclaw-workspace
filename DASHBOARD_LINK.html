<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karst Dashboard</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        h1 { color: #60a5fa; }
        .section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .task {
            background: #252525;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 3px solid #60a5fa;
        }
        .completed { border-left-color: #10b981; }
        .status { color: #10b981; font-weight: bold; }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .refresh { color: #60a5fa; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🪨 Karst Agent Dashboard</h1>
    <p class="refresh">Auto-refresh: <span id="countdown">10</span>s | Last updated: <span id="timestamp"></span></p>
    
    <div class="section">
        <h2>Active Tasks</h2>
        <div id="active-tasks">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Completed Tasks</h2>
        <div id="completed-tasks">Loading...</div>
    </div>
    
    <div class="section">
        <h2>TASKS.md Content</h2>
        <pre id="tasks-content">Loading...</pre>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // Read TASKS.md
                const response = await fetch('https://raw.githubusercontent.com/KarstAgent/glasswall/main/../../../TASKS.md');
                const text = await response.text();
                document.getElementById('tasks-content').textContent = text;
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
                
                // Parse active and completed
                const activeMatch = text.match(/## 🔄 Active Tasks([\s\S]*?)## /);
                const completedMatch = text.match(/## ✅ Completed Tasks([\s\S]*?)$/);
                
                if (activeMatch) {
                    document.getElementById('active-tasks').innerHTML = '<pre>' + activeMatch[1].trim() + '</pre>';
                }
                if (completedMatch) {
                    document.getElementById('completed-tasks').innerHTML = '<pre>' + completedMatch[1].trim() + '</pre>';
                }
            } catch (e) {
                document.getElementById('tasks-content').textContent = 'Error loading: ' + e.message;
            }
        }
        
        // Initial load
        loadDashboard();
        
        // Auto-refresh countdown
        let countdown = 10;
        setInterval(() => {
            countdown--;
            document.getElementById('countdown').textContent = countdown;
            if (countdown <= 0) {
                countdown = 10;
                loadDashboard();
            }
        }, 1000);
    </script>
</body>
</html>
